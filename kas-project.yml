header:
  version: 14
  defaults:
    repos:
      tag: "4.0"

machine: stm32mp1
distro: openstlinux-weston
target: st-image-weston

repos:
  # Явно указываем двоеточие, чтобы KAS понял, что это локальный репозиторий
  meta-custom-display:
    path: meta-custom-display

  meta-st-odyssey:
    url: 'https://github.com/Seeed-Studio/meta-st-odyssey.git'
    branch: 'openstlinux-6.1-yocto-mickledore'

  poky:
    url: 'https://github.com/yoctoproject/poky.git'
    branch: 'mickledore'
    layers:
      meta:
      meta-poky:

  meta-openembedded:
    url: 'https://github.com/openembedded/meta-openembedded.git'
    branch: 'mickledore'
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-gnome:
      meta-multimedia:
      meta-webserver:

  meta-st-stm32mp:
    url: 'https://github.com/STMicroelectronics/meta-st-stm32mp.git'
    branch: 'mickledore'

  meta-st-openstlinux:
    url: 'https://github.com/STMicroelectronics/meta-st-openstlinux.git'
    branch: 'mickledore'

local_conf_header:
  st-specific-settings: |
    ACCEPT_EULA_stm32mp1 = "1"
    ST_KERNEL_DEVICETREE = "stm32mp157c-odyssey-rpi"
